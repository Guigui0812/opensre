---
# Helm synthetic test scenario - healthy release
# Tests that Helm integration can properly investigate a release

name: helm_healthy_release
description: |
  A Helm release is deployed and healthy. This scenario verifies that
  the Helm integration can properly retrieve release information.

alert_file: alert.json
answer_file: answer.yml

# Required integrations for this scenario
required_integrations:
  - helm

# Expected tools to be invoked
expected_tools:
  - helm_list_releases
  - helm_release_status
  - helm_release_history
  - helm_release_values
  - helm_chart_metadata

# Context sources that should be available
context_sources:
  - helm
